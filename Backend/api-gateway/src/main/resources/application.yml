server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "https://localhost:4443"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders: "*"
            maxAge: 3600
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users,/api/users/**
          filters:
            - RewritePath=/api/users(?<segment>.*), /${segment}
        - id: block-internal-products
          uri: no://op
          predicates:
            - Path=/api/products/internal/**
          filters:
            - SetStatus=403
        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/products,/api/products/**
          filters:
            - RewritePath=/api/products(?<segment>.*), /${segment}
        - id: auth-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth,/api/auth/**
          filters:
            - RewritePath=/api/auth(?<segment>.*), /auth${segment}
        - id: media-service
          uri: ${MEDIA_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/media,/api/media/**
        - id: block-internal-profile
          uri: no://op
          predicates:
            - Path=/api/profile/internal/**
          filters:
            - SetStatus=403
        - id: profile-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/profile/**
          filters:
            - RewritePath=/api/profile/(?<segment>.*), /profile/${segment}
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/orders,/api/orders/**
