<nav class="navbar">
  <div class="nav-container">
    <div class="nav-brand">
      <a routerLink="/">Buy-01</a>
    </div>
    <div class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/products" routerLinkActive="active">Products</a>

      @if (!isAuthenticated) {
        <span class="nav-divider">|</span>
        <a routerLink="/login" routerLinkActive="active">Login</a>
        <a routerLink="/register" routerLinkActive="active">Register</a>
      }

      @if (isAuthenticated) {
        <span class="nav-divider">|</span>
        @if (isSeller) {
          <a routerLink="/seller/dashboard" routerLinkActive="active">Dashboard</a>
          <a routerLink="/seller/orders" routerLinkActive="active">Orders</a>
        }
        @if (!isSeller) {
          <a routerLink="/cart" routerLinkActive="active">🛒 Cart</a>
          <a routerLink="/orders" routerLinkActive="active">My Orders</a>
        }
        @if (currentUser) {
          <span class="user-info">
            @if (avatarUrl) {
              <img [src]="avatarUrl" alt="User avatar" class="user-avatar">
            } @else {
              <span class="user-avatar-placeholder">👤</span>
            }
            <span class="user-name">{{ currentUser.name }}</span>
            <button (click)="logout()" class="logout-btn">Logout</button>
          </span>
        }
      }
    </div>
  </div>
</nav>
<router-outlet />
