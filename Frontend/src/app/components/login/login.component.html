<div class="login-container">
  <div class="login-card">
    <div class="card-header">
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your account</p>
    </div>

    <form (ngSubmit)="submit()" #loginForm="ngForm">
      <!-- Main Error Alert -->
      <div class="alert alert-danger" *ngIf="error">
        <span class="alert-icon">⚠️</span>
        <span class="alert-message">{{ error }}</span>
      </div>

      <!-- Email Field -->
      <div class="form-group">
        <label for="email" class="form-label">
          Email Address
          <span class="required">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="model.email"
          required
          email
          [disabled]="loading"
          class="form-control"
          [class.form-control-error]="fieldErrors['email']"
          placeholder="Enter your email">
        <div class="field-error" *ngIf="fieldErrors['email']">
          <span class="error-icon">✗</span>
          {{ fieldErrors['email'] }}
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password" class="form-label">
          Password
          <span class="required">*</span>
        </label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="model.password"
          required
          [disabled]="loading"
          class="form-control"
          [class.form-control-error]="fieldErrors['password']"
          placeholder="Enter your password">
        <div class="field-error" *ngIf="fieldErrors['password']">
          <span class="error-icon">✗</span>
          {{ fieldErrors['password'] }}
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="!loginForm.form.valid || loading"
        class="btn btn-primary btn-lg">
        <span *ngIf="!loading" class="btn-text">Sign In</span>
        <span *ngIf="loading" class="btn-text">
          <span class="spinner"></span> Signing In...
        </span>
      </button>
    </form>

    <!-- Register Link -->
    <div class="footer-link">
      Don't have an account?
      <a routerLink="/register" class="link-action">Create one now</a>
    </div>
  </div>
</div>
