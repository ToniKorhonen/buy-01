# ============================================
# SonarCloud Configuration - Buy01 Monorepo
# ============================================

sonar.projectKey=ToniKorhonen_buy-01
sonar.organization=tonikorhonen
sonar.projectName=Buy01 E-Commerce Platform
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# ============== JAVA CONFIGURATION ==============
sonar.java.source=17
sonar.java.target=17

# ============== FRONTEND CONFIGURATION ==============
sonar.typescript.tsconfigPaths=Frontend/tsconfig.json,Frontend/tsconfig.app.json
sonar.javascript.node.maxspace=4096

# ============== EXCLUSIONS ==============
# Exclude build outputs, dependencies, and config files
sonar.exclusions=**/node_modules/**,**/dist/**,**/.angular/**,**/target/**,**/build/**,**/coverage/**,**/certs/**,**/*.xml,**/uploads/**
sonar.test.exclusions=**/node_modules/**,**/target/**
sonar.coverage.exclusions=**/dtos/**,**/dto/**,**/config/**,**/security/**,**/*Application.java,**/main.ts

# ============== SOURCE PATHS ==============
# Aggregate all sources
sonar.sources=Backend/user-service/src/main/java,Backend/product-service/src/main/java,Backend/media-service/src/main/java,Backend/api-gateway/src/main/java,Backend/order-service/src/main/java,Frontend/src

# ============== TEST PATHS ==============
# Aggregate all tests
sonar.tests=Backend/user-service/src/test/java,Backend/product-service/src/test/java,Backend/media-service/src/test/java,Backend/api-gateway/src/test/java,Backend/order-service/src/test/java

# ============== BINARY PATHS ==============
# Compiled classes for analysis
sonar.java.binaries=Backend/user-service/target/classes,Backend/product-service/target/classes,Backend/media-service/target/classes,Backend/api-gateway/target/classes,Backend/order-service/target/classes

# ============== COVERAGE REPORTS ==============
# JaCoCo XML reports for Java services
sonar.coverage.jacoco.xmlReportPaths=Backend/user-service/target/site/jacoco/jacoco.xml,Backend/product-service/target/site/jacoco/jacoco.xml,Backend/media-service/target/site/jacoco/jacoco.xml,Backend/api-gateway/target/site/jacoco/jacoco.xml,Backend/order-service/target/site/jacoco/jacoco.xml

# TypeScript/JavaScript coverage
sonar.javascript.lcov.reportPaths=Frontend/coverage/lcov.info


