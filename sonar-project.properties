# ============================================
# SonarCloud Configuration - Buy01 Monorepo
# ============================================

sonar.projectKey=ToniKorhonen_buy-01
sonar.organization=tonikorhonen
sonar.projectName=Buy01 E-Commerce Platform
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# ============== JAVA CONFIGURATION ==============
sonar.java.source=17
sonar.java.target=17
# Java dependencies for better analysis precision
sonar.java.libraries=~/.m2/repository/**/*.jar

# ============== FRONTEND CONFIGURATION ==============
sonar.typescript.tsconfigPaths=Frontend/tsconfig.json,Frontend/tsconfig.app.json
sonar.javascript.node.maxspace=4096

# ============== PROJECT MODULES ==============
# Define modules to avoid file duplication
sonar.modules=user-service,product-service,media-service,api-gateway,order-service,frontend

# User Service
user-service.sonar.projectName=User Service
user-service.sonar.sources=Backend/user-service/src/main/java
user-service.sonar.tests=Backend/user-service/src/test/java
user-service.sonar.java.binaries=Backend/user-service/target/classes
user-service.sonar.coverage.jacoco.xmlReportPaths=Backend/user-service/target/site/jacoco/jacoco.xml
user-service.sonar.java.libraries=~/.m2/repository/**/*.jar

# Product Service
product-service.sonar.projectName=Product Service
product-service.sonar.sources=Backend/product-service/src/main/java
product-service.sonar.tests=Backend/product-service/src/test/java
product-service.sonar.java.binaries=Backend/product-service/target/classes
product-service.sonar.coverage.jacoco.xmlReportPaths=Backend/product-service/target/site/jacoco/jacoco.xml
product-service.sonar.java.libraries=~/.m2/repository/**/*.jar

# Media Service
media-service.sonar.projectName=Media Service
media-service.sonar.sources=Backend/media-service/src/main/java
media-service.sonar.tests=Backend/media-service/src/test/java
media-service.sonar.java.binaries=Backend/media-service/target/classes
media-service.sonar.coverage.jacoco.xmlReportPaths=Backend/media-service/target/site/jacoco/jacoco.xml
media-service.sonar.java.libraries=~/.m2/repository/**/*.jar

# API Gateway
api-gateway.sonar.projectName=API Gateway
api-gateway.sonar.sources=Backend/api-gateway/src/main/java
api-gateway.sonar.tests=Backend/api-gateway/src/test/java
api-gateway.sonar.java.binaries=Backend/api-gateway/target/classes
api-gateway.sonar.java.libraries=~/.m2/repository/**/*.jar

# Order Service
order-service.sonar.projectName=Order Service
order-service.sonar.sources=Backend/order-service/src/main/java
order-service.sonar.tests=Backend/order-service/src/test/java
order-service.sonar.java.binaries=Backend/order-service/target/classes
order-service.sonar.java.libraries=~/.m2/repository/**/*.jar

# Frontend
frontend.sonar.projectName=Frontend
frontend.sonar.sources=Frontend/src
frontend.sonar.tests=Frontend/src
frontend.sonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**,**/.angular/**,**/certs/**,**/coverage/**
frontend.sonar.test.inclusions=**/*.spec.ts
frontend.sonar.coverage.lcov.reportPaths=Frontend/coverage/lcov.info

# ============== GLOBAL EXCLUSIONS ==============
sonar.exclusions=**/target/**,**/node_modules/**,**/*.xml,**/dist/**,**/.angular/**,**/certs/**,**/coverage/**,**/uploads/**,**/build-wrapper-dump.json
sonar.test.exclusions=**/target/**,**/node_modules/**

# ============== COVERAGE EXCLUSIONS ==============
sonar.coverage.exclusions=**/dto/**,**/dtos/**,**/config/**,**/security/**,**/ServiceUserApplication.java,**/ProductServiceApplication.java,**/MediaServiceApplication.java,**/ApiGatewayApplication.java,**/main.ts


